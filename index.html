<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <style>
        body{
            background-color:antiquewhite;
            text-align: center;
            
        }

        button{
            background-color: coral;
            color: white;
            border-radius:10px;
            height:50;
            width:400px;
            margin-top: 10px;  
        }
        button:hover{
            background-color:rgb(119, 194, 6);
        }

        #summary-heading{
            margin: 0 0 10px 0;
        }
        #summary-output{
            max-height: 200px;
            overflow-y: auto;
            background-color:bisque;
            width:400px;
            margin: 15px auto;
            padding: 15px;
            border-radius: 8px;
            text-align: left;

        }
        #summary-text{
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        h1{
            color:coral;
            text-align: center;
            text-decoration: underline;
            
        }

        h3{
            text-align: center;
        }

        textarea{
            height:100px;
            width: 400px;
            border-radius: 5px;
            text-align: justify;
        }
        .container{
            min-height: 500px;
            width:500px;
            border:4px solid black;
            margin:100px auto; 
            background-color: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px black;
           
        }
        p{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Summarizer</h1>
        <h3>using HuggingFace Transformer</h3>
        <p>Write or paste your content below for quick summarization.</p>
        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your content here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>
        <div id="summary-output">
            <h3 id="summary-heading">Content Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>
    <script>
         document.getElementById("summarization-form").addEventListener("submit", async (e) => {
            e.preventDefault();
        
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
        
            summaryText.innerText = "Processing...";
            submitButton.disabled = true;
        
            try {
                const response = await fetch("http://127.0.0.1:8000/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({dialogue: dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } catch (err) {
                
                summaryText.innerText = `Error: ${err.message}`;
            } finally {
                
                submitButton.disabled = false;
            }
        });
    </script>

    
</body>
</html>
